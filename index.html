<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoebe</title>
    <meta property="og:title" content="phoebe's silly website">
    <meta property="og:description" content="🏳️‍⚧️ 24 y/o, philly based, med student">
    <meta property="og:url" content="https://phoebe.gay">
    <meta name="theme-color" content="#b8b8f4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink:     #e8b8f4;
            --lavender: #b8b8f4;
            --mint:     #c8b8f4;
            --peach:    #d4b8f4;
            --rose:     #c8a0e8;
            --soft-white: #faf8ff;
            --text-dark: #2e2a40;
            --text-mid:  #6054a0;
            --text-light: #a898d0;
            --card-bg:  rgba(240,236,255,0.55);
            --card-border: rgba(255,255,255,0.8);
        }

        body {
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            background: #ede7f6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px 80px;
            overflow-x: hidden;
        }

        /* ── animated gradient background ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #ede7f6, #d8d4f8, #e8e4ff, #f3e8ff, #ede7f6);
            background-size: 400% 400%;
            animation: gradShift 18s ease infinite;
        }

        @keyframes gradShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── floating blobs ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.45;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        .blob-1 { width: 400px; height: 400px; background: #c5b8f4;     top: -100px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 300px; height: 300px; background: #b8b4f8;  bottom: -80px; right: -80px; animation-delay: -7s; }
        .blob-3 { width: 250px; height: 250px; background: #e0b8f4;      top: 40%; left: 60%; animation-delay: -13s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -30px) scale(1.05); }
            66%       { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ── stars ── */
        .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0;
            animation: twinkle var(--dur) ease-in-out infinite var(--delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50%       { opacity: 0.7; transform: scale(1); }
        }

        /* ── main container ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── avatar ── */
        .avatar-wrap {
            margin-bottom: 20px;
            animation: fadeDown 0.7s ease both;
        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--lavender), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 4px 24px rgba(140,120,220,0.3), 0 0 0 4px rgba(255,255,255,0.7);
        }

        /* ── name ── */
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--text-dark);
            letter-spacing: -0.02em;
            animation: fadeDown 0.7s 0.1s ease both;
            margin-bottom: 8px;
        }

        /* ── bio ── */
        .bio {
            font-size: 0.88rem;
            font-weight: 300;
            color: var(--text-mid);
            text-align: center;
            line-height: 1.6;
            max-width: 320px;
            animation: fadeDown 0.7s 0.2s ease both;
            margin-bottom: 36px;
        }

        /* ── links ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 22px;
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-dark);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 16px rgba(180,130,170,0.1);
            transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
            animation: fadeUp 0.6s ease both;
        }

        .link-card:nth-child(1) { animation-delay: 0.35s; }
        .link-card:nth-child(2) { animation-delay: 0.45s; }
        .link-card:nth-child(3) { animation-delay: 0.55s; }

        .link-card:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 32px rgba(180,130,170,0.22);
            background: rgba(255,255,255,0.72);
        }

        .link-card:active {
            transform: translateY(0) scale(0.99);
        }

        .link-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-icon svg {
            width: 22px;
            height: 22px;
        }

        .bluesky-icon { background: linear-gradient(135deg, #b8c8f4, #b8b4f8); }
        .instagram-icon { background: linear-gradient(135deg, #e0b8f4, #c8b8f8); }
        .twitter-icon { background: linear-gradient(135deg, #b8daf4, #b8c8f8); }

        .link-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .link-label {
            font-size: 0.78rem;
            font-weight: 400;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .link-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .link-arrow {
            margin-left: auto;
            color: var(--text-light);
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .link-card:hover .link-arrow {
            transform: translateX(4px);
        }

        /* ── now playing ── */
        .now-playing {
            width: 100%;
            margin-bottom: 24px;
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .now-playing a,
        .now-playing-idle {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-decoration: none;
            color: var(--text-dark);
            transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
        }

        .now-playing a:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 6px 24px rgba(180,130,170,0.18);
            background: rgba(255,255,255,0.72);
        }

        .now-playing-album-art {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .now-playing-album-art-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--lavender), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .now-playing-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .now-playing-label {
            font-size: 0.72rem;
            font-weight: 400;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .now-playing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1db954;
            animation: pulse 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        .now-playing-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-artist {
            font-size: 0.78rem;
            color: var(--text-mid);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing-spotify {
            margin-left: auto;
            flex-shrink: 0;
        }

        /* ── footer ── */
        .footer {
            margin-top: 48px;
            font-size: 0.75rem;
            color: var(--text-light);
            animation: fadeUp 0.6s 0.6s ease both;
        }

        /* ── keyframes ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="stars" id="stars"></div>

<div class="container">

    <div class="avatar-wrap">
        <div class="avatar">🌺</div>
    </div>

    <h1 class="name">Phoebe</h1>

    <p class="bio">🏳️‍⚧️ 24 y/o, philly based, med student</p>

    <!-- Now Playing -->
    <div class="now-playing" id="now-playing"></div>

    <div class="links">

        <a class="link-card" href="https://twitter.com/PhoebeDotGay" target="_blank" rel="noopener">
            <div class="link-icon twitter-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z" stroke="#4a6fa5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="link-text">
                <span class="link-label">Twitter</span>
                <span class="link-name">@PhoebeDotGay</span>
            </div>
            <span class="link-arrow">→</span>
        </a>

        <a class="link-card" href="https://instagram.com/phoebe.gay" target="_blank" rel="noopener">
            <div class="link-icon instagram-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="20" height="20" rx="6" stroke="#8060c0" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" stroke="#8060c0" stroke-width="2"/>
                    <circle cx="17.5" cy="6.5" r="1" fill="#8060c0"/>
                </svg>
            </div>
            <div class="link-text">
                <span class="link-label">Instagram</span>
                <span class="link-name">@phoebe.gay</span>
            </div>
            <span class="link-arrow">→</span>
        </a>

        <a class="link-card" href="https://bsky.app/profile/phoebe.gay" target="_blank" rel="noopener">
            <div class="link-icon bluesky-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 10.8C10.8 8.4 7.8 4.2 5.4 2.4 3 0.6 1.8 1.2 1.2 2.4 0.6 3.6 0.6 6 2.4 7.8 3.6 9 6.6 9.6 9 9.6 6.6 9.6 3 10.8 1.8 13.2 0.6 15.6 1.2 18 3 19.2 4.8 20.4 7.8 19.8 9.6 18 11.4 16.2 12 13.2 12 10.8Z" fill="#4a6fa5"/>
                    <path d="M12 10.8C13.2 8.4 16.2 4.2 18.6 2.4 21 0.6 22.2 1.2 22.8 2.4 23.4 3.6 23.4 6 21.6 7.8 20.4 9 17.4 9.6 15 9.6 17.4 9.6 21 10.8 22.2 13.2 23.4 15.6 22.8 18 21 19.2 20.4 16.2 19.8 14.4 18 12.6 16.2 12 13.2 12 10.8Z" fill="#4a6fa5"/>
                </svg>
            </div>
            <div class="link-text">
                <span class="link-label">Bluesky</span>
                <span class="link-name">@phoebe.gay</span>
            </div>
            <span class="link-arrow">→</span>
        </a>

    </div>

    <p class="footer">phoebe.gay ✦ made with love</p>

</div>

<script>
    // ── Spotify now playing ──────────────────────────────────────────────────
    // TODO: replace with your actual Vercel deployment URL after deploying
    const API_URL = 'https://phoebe-spotify-api.vercel.app/api/now-playing';

    const spotifyIcon = `<svg class="now-playing-spotify" width="18" height="18" viewBox="0 0 24 24" fill="#1db954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;

    async function fetchNowPlaying() {
        const el = document.getElementById('now-playing');
        try {
            const res = await fetch(API_URL);
            const data = await res.json();

            if (data.isPlaying) {
                el.innerHTML = `
                    <a href="${data.songUrl}" target="_blank" rel="noopener">
                        <img class="now-playing-album-art" src="${data.albumArt}" alt="${data.album}">
                        <div class="now-playing-text">
                            <span class="now-playing-label">
                                <span class="now-playing-dot"></span>
                                now playing
                            </span>
                            <span class="now-playing-title">${data.title}</span>
                            <span class="now-playing-artist">${data.artist}</span>
                        </div>
                        ${spotifyIcon}
                    </a>`;
            } else {
                el.innerHTML = `
                    <div class="now-playing-idle">
                        <div class="now-playing-album-art-placeholder">🎵</div>
                        <div class="now-playing-text">
                            <span class="now-playing-label">spotify</span>
                            <span class="now-playing-title">not listening to anything</span>
                        </div>
                        ${spotifyIcon}
                    </div>`;
            }
        } catch {
            // Silently fail — just hide the widget if API is unreachable
            el.style.display = 'none';
        }
    }

    fetchNowPlaying();
    // Refresh every 30 seconds
    setInterval(fetchNowPlaying, 30000);

    // ── twinkling stars ──────────────────────────────────────────────────────
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
        const s = document.createElement('div');
        s.classList.add('star');
        const size = Math.random() * 3 + 1;
        s.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            top: ${Math.random() * 100}%;
            left: ${Math.random() * 100}%;
            --dur: ${Math.random() * 4 + 3}s;
            --delay: ${Math.random() * -8}s;
        `;
        starsEl.appendChild(s);
    }
</script>

</body>
</html>
