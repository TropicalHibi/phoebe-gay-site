<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoebe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink:     #f4b8c8;
            --lavender: #cbb8f4;
            --mint:     #b8f4e0;
            --peach:    #f4d4b8;
            --rose:     #e8a0b4;
            --soft-white: #fdf8fb;
            --text-dark: #3a2a35;
            --text-mid:  #6e546a;
            --text-light: #b8a0b4;
            --card-bg:  rgba(255,255,255,0.55);
            --card-border: rgba(255,255,255,0.8);
        }

        body {
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            background: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px 80px;
            overflow-x: hidden;
        }

        /* ── animated gradient background ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #fce4ec, #ede7f6, #e8f5e9, #fff8e1, #fce4ec);
            background-size: 400% 400%;
            animation: gradShift 18s ease infinite;
        }

        @keyframes gradShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── floating blobs ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.45;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--pink);     top: -100px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 300px; height: 300px; background: var(--lavender);  bottom: -80px; right: -80px; animation-delay: -7s; }
        .blob-3 { width: 250px; height: 250px; background: var(--mint);      top: 40%; left: 60%; animation-delay: -13s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -30px) scale(1.05); }
            66%       { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ── stars ── */
        .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0;
            animation: twinkle var(--dur) ease-in-out infinite var(--delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50%       { opacity: 0.7; transform: scale(1); }
        }

        /* ── main container ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── avatar ── */
        .avatar-wrap {
            margin-bottom: 20px;
            animation: fadeDown 0.7s ease both;
        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--lavender));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 4px 24px rgba(200,140,180,0.3), 0 0 0 4px rgba(255,255,255,0.7);
        }

        /* ── name ── */
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--text-dark);
            letter-spacing: -0.02em;
            animation: fadeDown 0.7s 0.1s ease both;
            margin-bottom: 8px;
        }

        /* ── bio ── */
        .bio {
            font-size: 0.88rem;
            font-weight: 300;
            color: var(--text-mid);
            text-align: center;
            line-height: 1.6;
            max-width: 320px;
            animation: fadeDown 0.7s 0.2s ease both;
            margin-bottom: 36px;
        }

        /* ── links ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 22px;
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-dark);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 2px 16px rgba(180,130,170,0.1);
            transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
            animation: fadeUp 0.6s ease both;
        }

        .link-card:nth-child(1) { animation-delay: 0.35s; }
        .link-card:nth-child(2) { animation-delay: 0.45s; }

        .link-card:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 32px rgba(180,130,170,0.22);
            background: rgba(255,255,255,0.72);
        }

        .link-card:active {
            transform: translateY(0) scale(0.99);
        }

        .link-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-icon svg {
            width: 22px;
            height: 22px;
        }

        .bluesky-icon { background: linear-gradient(135deg, #b8d8f4, #c8b8f4); }
        .instagram-icon { background: linear-gradient(135deg, #f4b8d4, #f4c8b8); }

        .link-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .link-label {
            font-size: 0.78rem;
            font-weight: 400;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .link-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .link-arrow {
            margin-left: auto;
            color: var(--text-light);
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .link-card:hover .link-arrow {
            transform: translateX(4px);
        }

        /* ── footer ── */
        .footer {
            margin-top: 48px;
            font-size: 0.75rem;
            color: var(--text-light);
            animation: fadeUp 0.6s 0.6s ease both;
        }

        /* ── keyframes ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="stars" id="stars"></div>

<div class="container">

    <div class="avatar-wrap">
        <div class="avatar">🌸</div>
    </div>

    <h1 class="name">Phoebe</h1>

    <p class="bio">🏳️‍⚧️ 24 y/o trans fem, philly based, med student</p>

    <div class="links">

        <a class="link-card" href="https://bsky.app/profile/phoebe.gay" target="_blank" rel="noopener">
            <div class="link-icon bluesky-icon">
                <!-- Bluesky butterfly icon -->
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 10.8C10.8 8.4 7.8 4.2 5.4 2.4 3 0.6 1.8 1.2 1.2 2.4 0.6 3.6 0.6 6 2.4 7.8 3.6 9 6.6 9.6 9 9.6 6.6 9.6 3 10.8 1.8 13.2 0.6 15.6 1.2 18 3 19.2 4.8 20.4 7.8 19.8 9.6 18 11.4 16.2 12 13.2 12 10.8Z" fill="#4a6fa5"/>
                    <path d="M12 10.8C13.2 8.4 16.2 4.2 18.6 2.4 21 0.6 22.2 1.2 22.8 2.4 23.4 3.6 23.4 6 21.6 7.8 20.4 9 17.4 9.6 15 9.6 17.4 9.6 21 10.8 22.2 13.2 23.4 15.6 22.8 18 21 19.2 19.2 20.4 16.2 19.8 14.4 18 12.6 16.2 12 13.2 12 10.8Z" fill="#4a6fa5"/>
                </svg>
            </div>
            <div class="link-text">
                <span class="link-label">Bluesky</span>
                <span class="link-name">@phoebe.gay</span>
            </div>
            <span class="link-arrow">→</span>
        </a>

        <a class="link-card" href="https://instagram.com/phoebe.gay" target="_blank" rel="noopener">
            <div class="link-icon instagram-icon">
                <!-- Instagram icon -->
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="20" height="20" rx="6" stroke="#c8506a" stroke-width="2"/>
                    <circle cx="12" cy="12" r="4" stroke="#c8506a" stroke-width="2"/>
                    <circle cx="17.5" cy="6.5" r="1" fill="#c8506a"/>
                </svg>
            </div>
            <div class="link-text">
                <span class="link-label">Instagram</span>
                <span class="link-name">@phoebe.gay</span>
            </div>
            <span class="link-arrow">→</span>
        </a>

    </div>

    <p class="footer">phoebe.gay ✦ made with love</p>

</div>

<script>
    // generate twinkling stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
        const s = document.createElement('div');
        s.classList.add('star');
        const size = Math.random() * 3 + 1;
        s.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            top: ${Math.random() * 100}%;
            left: ${Math.random() * 100}%;
            --dur: ${Math.random() * 4 + 3}s;
            --delay: ${Math.random() * -8}s;
        `;
        starsEl.appendChild(s);
    }
</script>

</body>
</html>
