<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>phoebe.gay</title>
  <meta name="theme-color" content="#b8b8f4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text-dark:   #ece9ff;
      --text-mid:    #b8b0e8;
      --text-light:  #6e68a0;
      --card-bg:     rgba(30,26,52,0.7);
      --card-border: rgba(100,90,160,0.25);
      --divider:     rgba(100,90,160,0.15);
      --accent:      #a89ee8;
    }

    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: #100e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      overflow-x: hidden;
    }

    /* ── background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, #100e1e, #181428, #1a1530, #14102a, #100e1e);
      background-size: 400% 400%;
      animation: gradShift 18s ease infinite;
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(60px); opacity: 0.6; z-index: 0;
      animation: float 20s ease-in-out infinite;
    }
    .blob-1 { width: 400px; height: 400px; background: #3d2d6e; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: #2d2860; bottom: -80px; right: -80px; animation-delay: -7s; }
    .blob-3 { width: 250px; height: 250px; background: #4a2868; top: 40%; left: 60%; animation-delay: -13s; }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      33%       { transform: translate(30px,-30px) scale(1.05); }
      66%       { transform: translate(-20px,20px) scale(0.95); }
    }

    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%; background: white; opacity: 0;
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%       { opacity: 0.7; transform: scale(1); }
    }

    /* ── layout ── */
    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 600px;
      display: flex; flex-direction: column; align-items: center;
      gap: 0;
    }

    /* ── header ── */
    .site-header {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
      animation: fadeDown 0.6s ease both;
    }
    .site-header a {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 500;
      color: var(--text-dark); text-decoration: none;
      letter-spacing: -0.01em;
    }
    .site-header a:hover { color: var(--accent); }
    .page-label {
      font-size: 0.7rem; font-weight: 400;
      color: var(--text-light); letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── card ── */
    .receipt {
      width: 100%;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 32px rgba(140,120,220,0.12);
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }

    /* ── receipt header ── */
    .receipt-head {
      padding: 1.6rem 1.8rem 1.3rem;
      border-bottom: 1px solid var(--divider);
    }
    .receipt-head-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem;
    }
    .receipt-id-label {
      font-size: 0.65rem; font-weight: 500;
      color: var(--text-light); letter-spacing: 0.14em;
      text-transform: uppercase; margin-bottom: 0.2rem;
    }
    .receipt-id {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--text-dark);
      letter-spacing: -0.01em;
    }
    .receipt-meta {
      text-align: right; font-size: 0.72rem;
      color: var(--text-light); line-height: 1.7;
    }
    .receipt-meta strong { color: var(--text-mid); font-weight: 500; }

    .buyer-row { margin-top: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
    .buyer-label {
      font-size: 0.65rem; font-weight: 500;
      color: var(--text-light); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .buyer-pill {
      display: inline-flex; align-items: center;
      background: rgba(100,90,160,0.2);
      border: 1px solid rgba(120,110,180,0.35);
      border-radius: 99px;
      padding: 0.2rem 0.7rem;
      font-size: 0.78rem; color: var(--text-mid); font-weight: 500;
    }

    /* ── table ── */
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table thead tr { background: rgba(50,44,90,0.4); }
    .items-table th {
      font-size: 0.6rem; font-weight: 500; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--text-light);
      padding: 0.55rem 1.8rem; text-align: left;
      border-bottom: 1px solid var(--divider);
    }
    .items-table th.num { text-align: right; }
    .items-table tbody tr {
      border-bottom: 1px solid rgba(200,190,240,0.15);
      transition: background 0.15s;
    }
    .items-table tbody tr:last-child { border-bottom: none; }
    .items-table tbody tr:hover { background: rgba(100,90,160,0.12); }
    .items-table td { padding: 0.75rem 1.8rem; }

    .item-name { font-size: 0.9rem; font-weight: 500; color: var(--text-dark); }
    .item-id { font-size: 0.65rem; color: var(--text-light); margin-top: 0.1rem; }

    td.num { text-align: right; font-size: 0.82rem; }
    .qty { color: var(--text-light); font-weight: 300; }
    .price { color: var(--text-mid); }
    .line-total { color: var(--accent); font-weight: 500; }

    /* ── footer ── */
    .receipt-foot {
      padding: 1rem 1.8rem 1.3rem;
      border-top: 1px solid var(--divider);
      background: rgba(20,16,40,0.4);
    }
    .totals-row { display: flex; justify-content: space-between; align-items: center; }
    .totals-label {
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--text-light);
    }
    .totals-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; color: var(--accent);
      letter-spacing: -0.02em;
    }
    .item-count { font-size: 0.7rem; color: var(--text-light); margin-top: 0.2rem; }

    /* ── powered by ── */
    .w3b-link {
      margin-top: 1.2rem; text-align: center;
      font-size: 0.65rem; color: var(--text-light);
      letter-spacing: 0.06em;
      animation: fadeUp 0.5s 0.2s ease both; opacity: 0;
      animation-fill-mode: both;
    }
    .w3b-link a {
      color: var(--text-light); text-decoration: none;
      border-bottom: 1px solid rgba(168,152,208,0.4);
      padding-bottom: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .w3b-link a:hover { color: var(--accent); border-color: var(--accent); }

    /* ── states ── */
    .state { padding: 4rem 1.8rem; text-align: center; }
    .state-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.3; }
    .state-msg { font-size: 0.82rem; color: var(--text-light); letter-spacing: 0.04em; }
    .state-sub { font-size: 0.72rem; color: var(--text-light); margin-top: 0.5rem; opacity: 0.7; }

    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(184,184,244,0.3);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="stars" id="stars"></div>

<div class="wrap">
  <header class="site-header">
    <a href="/">Phoebe</a>
    <span class="page-label" id="page-label">404</span>
  </header>

  <div id="root"></div>

  <div class="w3b-link" id="w3b-link" style="display:none">
    powered by <a id="w3b-href" href="#" target="_blank" rel="noopener">weav3r.dev</a>
  </div>
</div>

<script>
  const API_BASE = 'https://phoebe-spotify-api.vercel.app';
  const path     = window.location.pathname;
  const match    = path.match(/^\/receipt\/([A-Za-z0-9_-]+)\/?$/);

  if (match) {
    document.title = 'Receipt ' + match[1] + ' \u00b7 phoebe.gay';
    document.getElementById('page-label').textContent = 'receipt';
    renderLoading();
    loadReceipt(match[1]);
  } else {
    document.title = '404 \u00b7 phoebe.gay';
    renderNotFound();
  }

  function renderLoading() {
    set('<div class="receipt"><div class="state"><div class="spinner"></div><div class="state-msg">fetching receipt\u2026</div></div></div>');
  }

  function renderError(msg) {
    set('<div class="receipt"><div class="state"><div class="state-icon">\u2715</div><div class="state-msg">' + esc(msg) + '</div></div></div>');
  }

  function renderNotFound() {
    set('<div class="receipt"><div class="state"><div class="state-icon">404</div><div class="state-msg">page not found</div><div class="state-sub"><a href="/" style="color:inherit">\u2190 go home</a></div></div></div>');
  }

  function renderReceipt(data, id) {
    var rows = (data.items || [])
      .slice()
      .sort(function(a,b){ return b.total_value - a.total_value; })
      .map(function(item) {
        return '<tr>' +
          '<td><div class="item-name">' + esc(item.item_name || '\u2014') + '</div>' +
          '<div class="item-id">#' + item.item_id + '</div></td>' +
          '<td class="num qty">' + item.quantity + '\u00d7</td>' +
          '<td class="num price">' + fmt(item.price_used) + '</td>' +
          '<td class="num line-total">' + fmt(item.total_value) + '</td>' +
          '</tr>';
      }).join('');

    var count = data.item_count != null ? data.item_count : (data.items ? data.items.length : 0);

    set('<div class="receipt">' +
      '<div class="receipt-head"><div class="receipt-head-row">' +
      '<div><div class="receipt-id-label">Receipt</div>' +
      '<div class="receipt-id">' + esc(id) + '</div></div>' +
      '<div class="receipt-meta"><div><strong>' + dateStr(data.created_at) + '</strong></div>' +
      (data.trade_id ? '<div>Trade #' + esc(String(data.trade_id)) + '</div>' : '') +
      '</div></div>' +
      (data.buyer_name ? '<div class="buyer-row"><span class="buyer-label">Buyer</span><span class="buyer-pill">' + esc(data.buyer_name) + '</span></div>' : '') +
      '</div>' +
      '<table class="items-table"><thead><tr>' +
      '<th>Item</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Subtotal</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div class="receipt-foot"><div class="totals-row">' +
      '<div><div class="totals-label">Total</div>' +
      '<div class="item-count">' + count + ' item type' + (count !== 1 ? 's' : '') + '</div></div>' +
      '<div class="totals-value">' + fmt(data.total_value) + '</div>' +
      '</div></div></div>');

    document.getElementById('w3b-href').href = 'https://weav3r.dev/receipt/' + id;
    document.getElementById('w3b-link').style.display = 'block';
  }

  async function loadReceipt(id) {
    try {
      var res = await fetch(API_BASE + '/api/receipt?id=' + encodeURIComponent(id));
      if (!res.ok) { renderError('Failed to load receipt (HTTP ' + res.status + ').'); return; }
      renderReceipt(await res.json(), id);
    } catch(e) {
      renderError('Failed to load receipt. Check your connection.');
    }
  }

  function set(html) { document.getElementById('root').innerHTML = html; }

  function fmt(n) { return '$' + Number(n).toLocaleString('en-US'); }

  function dateStr(epoch) {
    return new Date(epoch * 1000).toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // twinkling stars (same as index)
  const starsEl = document.getElementById('stars');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random() * 3 + 1;
    s.style.cssText = 'width:'+size+'px;height:'+size+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--dur:'+(Math.random()*4+3)+'s;--delay:'+Math.random()*-8+'s;';
    starsEl.appendChild(s);
  }
</script>
</body>
</html>
