<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>phoebe.gay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #10141a;
      --border:    #1e2530;
      --accent:    #c8a84b;
      --accent-dim:#7a6128;
      --green:     #3ddc84;
      --red:       #e05c5c;
      --text:      #dde3ed;
      --muted:     #5a6275;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; width: 100%; max-width: 640px; }
    .site-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .site-header a { font-family: var(--sans); font-weight: 800; font-size: 1rem; color: var(--accent); text-decoration: none; letter-spacing: 0.04em; }
    .site-header a:hover { color: var(--text); }
    .site-header span { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.12em; }
    .receipt { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .receipt-stripe { height: 3px; background: linear-gradient(90deg, var(--accent-dim), var(--accent), var(--accent-dim)); }
    .receipt-head { padding: 1.6rem 1.8rem 1.2rem; border-bottom: 1px solid var(--border); }
    .receipt-head-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .receipt-id-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.25rem; }
    .receipt-id { font-family: var(--mono); font-size: 1rem; color: var(--accent); letter-spacing: 0.06em; }
    .receipt-meta { text-align: right; font-family: var(--mono); font-size: 0.7rem; color: var(--muted); line-height: 1.7; }
    .receipt-meta strong { color: var(--text); font-weight: 400; }
    .buyer-row { margin-top: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .buyer-pill { display: inline-flex; align-items: center; background: rgba(200,168,75,0.08); border: 1px solid var(--accent-dim); border-radius: 2px; padding: 0.25rem 0.65rem; font-family: var(--mono); font-size: 0.75rem; color: var(--accent); }
    .buyer-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table thead tr { background: rgba(30,37,48,0.6); }
    .items-table th { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 0.6rem 1.8rem; text-align: left; font-weight: 400; border-bottom: 1px solid var(--border); }
    .items-table th.num { text-align: right; }
    .items-table tbody tr { border-bottom: 1px solid rgba(30,37,48,0.8); transition: background 0.12s; }
    .items-table tbody tr:last-child { border-bottom: none; }
    .items-table tbody tr:hover { background: rgba(200,168,75,0.03); }
    .items-table td { padding: 0.75rem 1.8rem; font-size: 0.875rem; }
    .item-name { font-family: var(--sans); font-weight: 600; color: var(--text); }
    .item-id { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }
    td.num { text-align: right; font-family: var(--mono); font-size: 0.8rem; }
    .qty { color: var(--muted); }
    .line-total { color: var(--accent); }
    .delta { display: inline-block; font-family: var(--mono); font-size: 0.6rem; padding: 0.1rem 0.35rem; border-radius: 2px; margin-left: 0.3rem; vertical-align: middle; }
    .delta.below { background: rgba(61,220,132,0.1); color: var(--green); }
    .delta.above { background: rgba(224,92,92,0.1); color: var(--red); }
    .delta.at    { background: rgba(90,98,117,0.2); color: var(--muted); }
    .receipt-foot { padding: 1rem 1.8rem 1.4rem; border-top: 1px solid var(--border); background: rgba(10,12,15,0.4); }
    .totals-row { display: flex; justify-content: space-between; align-items: center; }
    .totals-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .totals-value { font-family: var(--mono); font-size: 1.35rem; color: var(--accent); letter-spacing: 0.04em; }
    .item-count { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
    .w3b-link { margin-top: 1.5rem; text-align: center; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; }
    .w3b-link a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 1px; transition: color 0.15s, border-color 0.15s; }
    .w3b-link a:hover { color: var(--accent); border-color: var(--accent-dim); }
    .state { padding: 4rem 1.8rem; text-align: center; font-family: var(--mono); }
    .state-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.4; }
    .state-msg { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.06em; }
    .state-sub { font-size: 0.7rem; color: var(--muted); margin-top: 0.5rem; opacity: 0.6; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 0.75rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <a href="/">phoebe.gay</a>
      <span id="page-label">404</span>
    </header>
    <div id="root"></div>
    <div class="w3b-link" id="w3b-link" style="display:none">
      powered by <a id="w3b-href" href="#" target="_blank" rel="noopener">weav3r.dev</a>
    </div>
  </div>

  <script>
    const API_BASE = 'https://phoebe-spotify-api.vercel.app';
    const path     = window.location.pathname;
    const match    = path.match(/^\/receipt\/([A-Za-z0-9_-]+)\/?$/);

    if (match) {
      document.title = 'Receipt ' + match[1] + ' \u00b7 phoebe.gay';
      document.getElementById('page-label').textContent = 'TORN \u00b7 RECEIPT';
      renderLoading();
      loadReceipt(match[1]);
    } else {
      document.title = '404 \u00b7 phoebe.gay';
      renderNotFound();
    }

    function renderLoading() {
      set('<div class="receipt"><div class="receipt-stripe"></div><div class="state"><div class="spinner"></div><div class="state-msg">fetching receipt\u2026</div></div></div>');
    }

    function renderError(msg) {
      set('<div class="receipt"><div class="receipt-stripe"></div><div class="state"><div class="state-icon">\u2715</div><div class="state-msg">' + esc(msg) + '</div></div></div>');
    }

    function renderNotFound() {
      set('<div class="receipt"><div class="receipt-stripe"></div><div class="state"><div class="state-icon">404</div><div class="state-msg">page not found</div><div class="state-sub"><a href="/" style="color:inherit">\u2190 go home</a></div></div></div>');
    }

    function renderReceipt(data, id) {
      var rows = (data.items || []).slice().sort(function(a,b){return b.total_value-a.total_value;}).map(function(item) {
        return '<tr>' +
          '<td><div class="item-name">' + esc(item.item_name || '\u2014') + '</div><div class="item-id">#' + item.item_id + '</div></td>' +
          '<td class="num qty">' + item.quantity + '\u00d7</td>' +
          '<td class="num">' + fmt(item.price_used) + '</td>' +
          '<td class="num line-total">' + fmt(item.total_value) + '</td>' +
          '</tr>';
      }).join('');

      var count = data.item_count != null ? data.item_count : (data.items ? data.items.length : 0);

      set('<div class="receipt"><div class="receipt-stripe"></div>' +
        '<div class="receipt-head"><div class="receipt-head-row">' +
        '<div><div class="receipt-id-label">Receipt ID</div><div class="receipt-id">' + esc(id) + '</div></div>' +
        '<div class="receipt-meta"><div><strong>' + dateStr(data.created_at) + '</strong></div>' +
        (data.trade_id ? '<div>Trade #' + esc(String(data.trade_id)) + '</div>' : '') + '</div>' +
        '</div>' +
        (data.buyer_name ? '<div class="buyer-row"><span class="buyer-label">Buyer</span><span class="buyer-pill">' + esc(data.buyer_name) + '</span></div>' : '') +
        '</div>' +
        '<table class="items-table"><thead><tr>' +
        '<th>Item</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Subtotal</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>' +
        '<div class="receipt-foot"><div class="totals-row">' +
        '<div><div class="totals-label">Total</div><div class="item-count">' + count + ' item type' + (count !== 1 ? 's' : '') + '</div></div>' +
        '<div class="totals-value">' + fmt(data.total_value) + '</div>' +
        '</div></div></div>');

      document.getElementById('w3b-href').href = 'https://weav3r.dev/receipt/' + id;
      document.getElementById('w3b-link').style.display = 'block';
    }

    async function loadReceipt(id) {
      try {
        var res = await fetch(API_BASE + '/api/receipt?id=' + encodeURIComponent(id));
        if (!res.ok) { renderError('Failed to load receipt (HTTP ' + res.status + ').'); return; }
        renderReceipt(await res.json(), id);
      } catch(e) {
        renderError('Failed to load receipt. Check your connection.');
      }
    }

    function set(html) { document.getElementById('root').innerHTML = html; }

    function fmt(n) { return '$' + Number(n).toLocaleString('en-US'); }

    function dateStr(epoch) {
      return new Date(epoch * 1000).toLocaleString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function deltaBadge(priceUsed, marketPrice) {
      if (!marketPrice) return '';
      var pct = ((priceUsed - marketPrice) / marketPrice) * 100;
      if (Math.abs(pct) < 0.5) return '<span class="delta at">\u2248 MKT</span>';
      var sign = pct > 0 ? '+' : '';
      return '<span class="delta ' + (pct > 0 ? 'above' : 'below') + '">' + sign + pct.toFixed(1) + '%</span>';
    }

    function esc(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
